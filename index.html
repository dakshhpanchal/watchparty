<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>WatchParty · Resilient P2P Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0c10;
      color: #eef2ff;
      font-family: 'Inter', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
    }
    :root {
      --bg: #0a0c10;
      --surface: #11161f;
      --surface2: #181e2a;
      --border: #29303e;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --danger: #f43f5e;
      --success: #10b981;
      --muted: #8592a8;
    }
    .hidden { display: none !important; }
    #lobby {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      background: radial-gradient(circle at 20% 30%, #0f131c, #080b10);
    }
    .lobby-wrap { max-width: 1100px; width: 100%; }
    .hero { text-align: center; margin-bottom: 2rem; }
    .hero h1 {
      font-size: 3rem;
      font-weight: 800;
      background: linear-gradient(135deg, #fff, #8ab3ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2rem;
      padding: 1.8rem;
      backdrop-filter: blur(2px);
    }
    .card h2 { font-size: 1.4rem; margin-bottom: 0.5rem; }
    .card p { color: var(--muted); font-size: 0.85rem; margin-bottom: 1.5rem; }
    .input-group { display: flex; flex-direction: column; gap: 0.75rem; }
    input, .btn {
      border-radius: 1rem;
      font-size: 0.9rem;
      font-family: inherit;
    }
    input {
      background: var(--surface2);
      border: 1px solid var(--border);
      padding: 0.85rem 1rem;
      color: white;
      outline: none;
    }
    input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
    .btn {
      border: none;
      padding: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); transform: scale(0.98); }
    .btn-secondary { background: var(--surface2); border: 1px solid var(--border); color: white; }
    .room-code-box {
      background: var(--surface2);
      border: 1px dashed var(--border);
      padding: 0.75rem;
      text-align: center;
      border-radius: 1rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-top: 0.5rem;
    }
    #room {
      display: none;
      flex-direction: column;
      height: 100vh;
      width: 100%;
    }
    .topbar {
      height: 60px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.2rem;
      gap: 1rem;
      flex-shrink: 0;
    }
    .logo { font-weight: 800; font-size: 1.2rem; background: linear-gradient(120deg, #fff, #6ea4ff); -webkit-background-clip: text; background-clip: text; color: transparent; }
    .room-pill { background: var(--surface2); padding: 0.3rem 1rem; border-radius: 2rem; font-family: monospace; font-weight: 600; font-size: 0.8rem; }
    .peer-count { font-size: 0.8rem; color: var(--muted); }
    .spacer { flex: 1; }
    .leave-btn { background: var(--danger); border: none; padding: 0.5rem 1rem; border-radius: 1rem; color: white; font-weight: 600; cursor: pointer; }
    .room-layout { flex: 1; display: flex; min-height: 0; }
    .stage {
      flex: 1;
      background: #000;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #main-video { width: 100%; height: 100%; object-fit: contain; }
    .placeholder {
      position: absolute;
      color: var(--muted);
      background: rgba(0,0,0,0.6);
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      backdrop-filter: blur(8px);
      font-size: 0.9rem;
    }
    .stage-top {
      position: absolute;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      display: flex;
      justify-content: space-between;
      pointer-events: none;
    }
    .stage-label, #fullscreen-btn { pointer-events: auto; }
    .stage-label {
      position: absolute;
      top: 1rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 0.45rem 1.2rem;
      border-radius: 2rem;
      font-size: 0.75rem;
      border: 0.5px solid rgba(255,255,255,0.2);
      text-align: center;
      z-index: 5;
    }
    #fullscreen-btn {
      background: rgba(0,0,0,0.6);
      border: none;
      color: white;
      width: 38px;
      height: 38px;
      border-radius: 1rem;
      font-size: 1.2rem;
      cursor: pointer;
    }
    .sidebar {
      width: 360px;
      min-width: 360px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    .tabs { display: flex; border-bottom: 1px solid var(--border); }
    .tab-btn {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      padding: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      position: relative;
    }
    .tab-btn.active { color: white; background: rgba(255,255,255,0.03); }
    #chat-badge {
      position: absolute;
      top: 0.5rem;
      right: 1.2rem;
      background: var(--danger);
      border-radius: 20px;
      min-width: 18px;
      height: 18px;
      font-size: 0.7rem;
      display: none;
      align-items: center;
      justify-content: center;
      color: white;
    }
    .panel { flex: 1; overflow: hidden; display: none; }
    .panel.active { display: flex; flex-direction: column; }
    #peers-panel { padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.8rem; }
    .peer-card {
      background: var(--surface2);
      border-radius: 1.2rem;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .peer-video { height: 120px; background: #000; }
    .peer-meta { padding: 0.7rem; font-size: 0.8rem; font-weight: 500; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }
    .chat-msg-header { display: flex; gap: 0.6rem; align-items: baseline; margin-bottom: 0.2rem; }
    .chat-msg-author { font-weight: 700; font-size: 0.8rem; }
    .chat-msg-time { font-size: 0.65rem; color: var(--muted); }
    .chat-msg-text { word-break: break-word; line-height: 1.4; font-size: 0.85rem; }
    .chat-input {
      border-top: 1px solid var(--border);
      padding: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      width: 100%;
    }

    .chat-input input {
      flex: 1;
      width: 100%;
      min-width: 0;
    }

    #send-chat-btn {
      height: 46px;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border-radius: 0.9rem;
    }
    .controls {
      height: 70px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.2rem;
      gap: 1rem;
    }
    .ctrl-btn {
      background: var(--surface2);
      border: none;
      border-radius: 1.2rem;
      padding: 0.6rem 1.2rem;
      font-weight: 600;
      color: white;
      cursor: pointer;
    }
    .ctrl-btn.primary { background: var(--accent); }
    .ctrl-btn.danger { background: var(--danger); }
    .ctrl-btn.mic-off { background: var(--surface2); border: 1px solid var(--border); }
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%);
      background: #1e2432;
      backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      padding: 0.6rem 1.2rem;
      border-radius: 3rem;
      font-size: 0.8rem;
      z-index: 1000;
      display: none;
      white-space: nowrap;
    }
    @media (max-width: 780px) {
      .room-layout { flex-direction: column; }
      .sidebar { width: 100%; height: 38%; border-top: 1px solid var(--border); }
      .stage { height: 62%; }
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="lobby">
  <div class="lobby-wrap">
    <div class="hero"><h1>WatchParty</h1></div>
    <div class="cards">
      <div class="card"><h2> Create Room</h2><p>Host a private watch party.</p><div class="input-group"><input id="host-name" placeholder="Your name" maxlength="32"><button class="btn btn-primary" id="create-btn">Create Room</button><div id="room-id-display" class="room-code-box hidden"></div></div></div>
      <div class="card"><h2> Join Room</h2><p>Enter 6‑character code (ABC‑123).</p><div class="input-group"><input id="join-name" placeholder="Your name" maxlength="32"><input id="join-code" placeholder="Room code"><button class="btn btn-secondary" id="join-btn">Join Room</button></div></div>
    </div>
  </div>
</div>

<div id="room">
  <div class="topbar"><div class="logo"> WatchParty</div><div class="room-pill" id="header-room-id"></div><div class="peer-count"> <span id="peer-count-num">1</span></div><div class="spacer"></div><button class="leave-btn" id="leave-room-btn">Leave</button></div>
  <div class="room-layout">
    <div class="stage"><video id="main-video" autoplay playsinline muted></video><div class="placeholder" id="placeholder"> No screen shared</div><div class="stage-top"><div class="stage-label" id="stage-label">No stream</div><button id="fullscreen-btn"></button></div></div>
    <div class="sidebar"><div class="tabs"><button class="tab-btn active" data-tab="peers"> Peers</button><button class="tab-btn" data-tab="chat"> Chat <span id="chat-badge">0</span></button></div><div class="panel active" id="peers-panel"></div><div class="panel" id="chat-panel"><div class="chat-messages" id="chat-messages"></div><div class="chat-input"><input id="chat-input" type="text" placeholder="Message..." maxlength="300"><button class="btn btn-secondary" id="send-chat-btn">Send</button></div></div></div>
  </div>
  <div class="controls"><button class="ctrl-btn primary" id="share-btn"> Share Screen</button><button class="ctrl-btn mic-off" id="mute-btn"> Enable Mic</button></div>
</div>
<div id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js"></script>
<script>
  (function(){

    const ICE_CONFIG = {
      iceServers: [
        { urls: 'stun:stun.l.google.com:19302' },
        { urls: 'stun:stun1.l.google.com:19302' },
        { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' }
      ]
    };

    const lobbyDiv = document.getElementById('lobby');
    const roomDiv = document.getElementById('room');
    const toastEl = document.getElementById('toast');
    const mainVideo = document.getElementById('main-video');
    const shareBtn = document.getElementById('share-btn');
    const muteBtn = document.getElementById('mute-btn');
    const peersPanel = document.getElementById('peers-panel');
    const chatMessagesDiv = document.getElementById('chat-messages');
    const chatInput = document.getElementById('chat-input');
    const sendChatBtn = document.getElementById('send-chat-btn');
    const leaveBtn = document.getElementById('leave-room-btn');
    const fullscreenBtn = document.getElementById('fullscreen-btn');
    const createBtn = document.getElementById('create-btn');
    const joinBtn = document.getElementById('join-btn');
    const hostNameInput = document.getElementById('host-name');
    const joinNameInput = document.getElementById('join-name');
    const joinCodeInput = document.getElementById('join-code');
    const roomIdDisplay = document.getElementById('room-id-display');
    const headerRoomId = document.getElementById('header-room-id');
    const peerCountSpan = document.getElementById('peer-count-num');
    const chatBadge = document.getElementById('chat-badge');

    let peer = null;
    let toastTimer = null;
    let activeShareLock = false;
    let isHost = false;
    let roomSecret = null;
    let migrationInProgress = false;
    let currentHostId = null;
    const peersMap = new Map();            // peerId -> { dataConn, name, screenCall, micCalls:Map }
    const remoteMicStreams = new Map();    // ownerId -> MediaStream
    let myName = '';
    let currentRoomId = '';
    
    let myScreenStream = null;
    let isSharingScreen = false;
    let myMicStream = null;
    let isMicEnabled = false;
    
    let activeShareOwner = null;
    let activeShareName = '';
    let activeShareStream = null;
    
    let currentTab = 'peers';
    let unreadCount = 0;

    function toast(msg, dur = 3000) {
      toastEl.textContent = msg;
      toastEl.style.display = 'block';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toastEl.style.display = 'none'; }, dur);
    }
    
    function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])).substring(0, 300); }
    
    function updatePeerCountUI() { peerCountSpan.innerText = peersMap.size + 1; }
    
    function addSystemMessage(text) {
      const div = document.createElement('div');
      div.className = 'chat-msg';
      div.innerHTML = `<div class="chat-msg-text" style="color:#8a93a5; font-style:italic;"> ${escapeHtml(text)}</div>`;
      chatMessagesDiv.appendChild(div);
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    function addChatMessage(author, text, isSystem = false) {
      const div = document.createElement('div');
      div.className = 'chat-msg';
      const time = new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
      if(isSystem) {
        div.innerHTML = `<div class="chat-msg-text" style="color:#aaa;">${escapeHtml(text)}</div>`;
      } else {
        div.innerHTML = `<div class="chat-msg-header"><span class="chat-msg-author">${escapeHtml(author)}</span><span class="chat-msg-time">${time}</span></div><div class="chat-msg-text">${escapeHtml(text)}</div>`;
      }
      chatMessagesDiv.appendChild(div);
      chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
      if(currentTab !== 'chat') {
        unreadCount++;
        chatBadge.style.display = 'flex';
        chatBadge.innerText = unreadCount;
      }
    }
    
    function broadcastToPeers(msg, excludePeerId = null) {
      for(let [pid, p] of peersMap.entries()) {
        if(pid !== excludePeerId && p.dataConn && p.dataConn.open) {
          p.dataConn.send(JSON.stringify(msg));
        }
      }
    }

    function callPeerWithScreen(peerId, stream, ownerId, ownerName) {
      if(!stream || peerId === peer?.id) return;
      const p = peersMap.get(peerId);
      if(!p) return;
      if(p.screenCall) p.screenCall.close();
      const call = peer.call(peerId, stream, { metadata: { type:'screen', ownerId, ownerName } });
      p.screenCall = call;
      call.on('close', () => { if(p.screenCall === call) p.screenCall = null; });
    }
    
    function callPeerWithMic(peerId, stream, ownerId) {
      if(!stream || peerId === peer?.id) return;
      const p = peersMap.get(peerId);
      if(!p) return;
      if(!p.micCalls) p.micCalls = new Map();
      if(p.micCalls.has(ownerId)) p.micCalls.get(ownerId).close();
      const call = peer.call(peerId, stream, { metadata: { type:'mic', ownerId } });
      p.micCalls.set(ownerId, call);
      call.on('close', () => p.micCalls.delete(ownerId));
      return call;
    }
    
    function stopRemoteMic(ownerId) {
      const stream = remoteMicStreams.get(ownerId);
      if(stream) { stream.getTracks().forEach(t => t.stop()); remoteMicStreams.delete(ownerId); }
      for(let [pid, p] of peersMap.entries()) {
        if(p.micCalls && p.micCalls.has(ownerId)) {
          p.micCalls.get(ownerId).close();
          p.micCalls.delete(ownerId);
        }
      }
      const audioEl = document.getElementById(`remote-audio-${ownerId.replace(/[^a-z0-9]/gi,'')}`);
      if(audioEl) { audioEl.srcObject = null; audioEl.remove(); }
    }
    
    function handleRemoteShareStop(ownerId) {
      if(activeShareOwner !== ownerId) return;
      activeShareLock = false;
      activeShareOwner = null;
      activeShareStream = null;
      mainVideo.srcObject = null;
      document.getElementById('placeholder').style.display = 'block';
      document.getElementById('stage-label').innerText = 'No screen shared';
      if(isHost) broadcastToPeers({ type:'screen_stop', ownerId });
    }

    async function startScreenShare() {
      if(activeShareLock && activeShareOwner !== peer?.id) { toast("Someone is already sharing screen", 2000); return; }
      if(isSharingScreen) return;
      try {
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
        myScreenStream = stream;
        isSharingScreen = true;
        activeShareLock = true;
        activeShareOwner = peer.id;
        activeShareName = myName;
        activeShareStream = stream;
        mainVideo.srcObject = stream;
        mainVideo.muted = true;
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('stage-label').innerText = `${myName}'s screen`;
        shareBtn.classList.add('danger');
        shareBtn.innerHTML = ' Stop Sharing';
        for(let [pid] of peersMap.entries()) {
          callPeerWithScreen(pid, stream, peer.id, myName);
        }
        stream.getVideoTracks()[0]?.addEventListener('ended', () => stopScreenShare());
      } catch(e) { toast("Screen share cancelled"); }
    }
    
    function stopScreenShare() {
      if(!myScreenStream) return;
      myScreenStream.getTracks().forEach(t => t.stop());
      myScreenStream = null;
      isSharingScreen = false;
      if(activeShareOwner === peer?.id) {
        activeShareLock = false;
        activeShareOwner = null;
        activeShareStream = null;
        mainVideo.srcObject = null;
        document.getElementById('placeholder').style.display = 'block';
        document.getElementById('stage-label').innerText = 'No screen shared';
        broadcastToPeers({ type:'screen_stop', ownerId: peer.id });
      }
      shareBtn.classList.remove('danger');
      shareBtn.innerHTML = ' Share Screen';
    }
    
    async function toggleMic() {
      if(!myMicStream) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
          myMicStream = stream;
          isMicEnabled = true;
          for(let [pid] of peersMap.entries()) callPeerWithMic(pid, stream, peer.id);
          muteBtn.innerHTML = ' Disable Mic';
          muteBtn.classList.remove('mic-off');
          muteBtn.style.background = '#3b82f6';
          return;
        } catch(e) { toast("Microphone access denied"); return; }
      }
      if(isMicEnabled) {
        myMicStream.getAudioTracks().forEach(t => t.enabled = false);
        isMicEnabled = false;
        for(let [pid, p] of peersMap.entries()) {
          if(p.micCalls && p.micCalls.has(peer.id)) {
            p.micCalls.get(peer.id).close();
            p.micCalls.delete(peer.id);
          }
        }
        broadcastToPeers({ type:'mic_stop', ownerId: peer.id });
        muteBtn.innerHTML = ' Enable Mic';
        muteBtn.classList.add('mic-off');
        muteBtn.style.background = '#181e2a';
      } else {
        if(myMicStream) myMicStream.getAudioTracks().forEach(t => t.enabled = true);
        else {
          try { myMicStream = await navigator.mediaDevices.getUserMedia({ audio: true }); } catch(e){ toast("Mic unavailable"); return; }
        }
        isMicEnabled = true;
        for(let [pid] of peersMap.entries()) callPeerWithMic(pid, myMicStream, peer.id);
        muteBtn.innerHTML = ' Disable Mic';
        muteBtn.classList.remove('mic-off');
        muteBtn.style.background = '#3b82f6';
      }
    }

    function onPeerCall(call) {
      const meta = call.metadata || {};
      if(meta.type === 'mic') {
        call.answer();
        const ownerId = meta.ownerId || call.peer;
        call.on('stream', (stream) => {
          remoteMicStreams.set(ownerId, stream);
          let audioEl = document.getElementById(`remote-audio-${ownerId.replace(/[^a-z0-9]/gi,'')}`);
          if(!audioEl) {
            audioEl = document.createElement('audio');
            audioEl.id = `remote-audio-${ownerId.replace(/[^a-z0-9]/gi,'')}`;
            audioEl.autoplay = true;
            document.body.appendChild(audioEl);
          }
          audioEl.srcObject = stream;
          if(isHost && ownerId !== peer?.id) {
            for(let [pid] of peersMap.entries()) {
              if(pid !== ownerId && pid !== call.peer) {
                callPeerWithMic(pid, stream, ownerId);
              }
            }
          }
        });
        call.on('close', () => { stopRemoteMic(ownerId); });
        return;
      }

      call.answer();
      const ownerId = meta.ownerId || call.peer;
      const ownerName = meta.ownerName || 'User';
      call.on('stream', (stream) => {
        if(activeShareLock && activeShareOwner !== ownerId) {
          toast(" Another screen share already playing", 1500);
          return;
        }
        activeShareLock = true;
        activeShareOwner = ownerId;
        activeShareName = ownerName;
        activeShareStream = stream;
        mainVideo.muted = (ownerId === peer?.id);
        mainVideo.srcObject = stream;
        document.getElementById('placeholder').style.display = 'none';
        document.getElementById('stage-label').innerText = `${ownerName}'s screen`;
        if(isHost && ownerId !== peer?.id) {
          for(let [pid] of peersMap.entries()) {
            if(pid !== ownerId) callPeerWithScreen(pid, stream, ownerId, ownerName);
          }
        }
        stream.getVideoTracks()[0]?.addEventListener('ended', () => handleRemoteShareStop(ownerId));
      });
      call.on('close', () => handleRemoteShareStop(ownerId));
    }

    async function performHostMigration() {
      if(migrationInProgress || isHost || peersMap.size === 0) return;
      migrationInProgress = true;

      const sortedPeers = Array.from(peersMap.keys()).sort();
      const newHostId = sortedPeers[0];
      const newHostInfo = peersMap.get(newHostId);
      
      if(!newHostInfo || newHostId === peer?.id) {
        migrationInProgress = false;
        return;
      }
      
      addSystemMessage(` Host left. Migrating to ${newHostInfo.name || 'new host'}...`);
      toast("Host migration in progress, reconnecting...", 4000);

      const migrationMsg = { type: 'host_migration', newHostId: newHostId, newHostName: newHostInfo.name, roomSecret: roomSecret };
      broadcastToPeers(migrationMsg);

      setTimeout(() => {

        if(peer) peer.destroy();

        isHost = false;
        peer = new Peer(ICE_CONFIG);
        peer.on('open', async () => {
          const conn = peer.connect(newHostId, { reliable: true });
          setupDataConnection(conn, false);
          peer.on('call', onPeerCall);
          toast(`Reconnected to new host: ${newHostInfo.name}`);
          migrationInProgress = false;
        });
        peer.on('error', () => {
          toast("Migration failed, room may be unstable");
          migrationInProgress = false;
        });
      }, 500);
    }

    function addPeerConnection(peerId, displayName) {

      if(peersMap.has(peerId) && peersMap.get(peerId).name !== 'Connecting...') return;
      const existing = peersMap.get(peerId) || { dataConn: null, micCalls: new Map() };
      existing.name = displayName;
      peersMap.set(peerId, existing);
      updatePeerCountUI();
      const cardDiv = document.createElement('div');
      cardDiv.className = 'peer-card';
      cardDiv.id = `peer-card-${peerId}`;
      cardDiv.innerHTML = `<div class="peer-video"></div><div class="peer-meta"> ${escapeHtml(displayName)}</div>`;
      peersPanel.appendChild(cardDiv);
      addSystemMessage(`${displayName} joined`);

      if(isHost) {
        if(activeShareStream && activeShareOwner) {
          callPeerWithScreen(peerId, activeShareStream, activeShareOwner, activeShareName);
        }
        for(let [ownerId, stream] of remoteMicStreams.entries()) {
          callPeerWithMic(peerId, stream, ownerId);
        }
        if(isMicEnabled && myMicStream) callPeerWithMic(peerId, myMicStream, peer.id);
        if(isSharingScreen && myScreenStream) callPeerWithScreen(peerId, myScreenStream, peer.id, myName);
      }
    }
    
    function setupDataConnection(conn, isIncoming = false) {
      const peerId = conn.peer;
      let authenticated = false;
      
      conn.on('open', () => {
        if(!isIncoming && !isHost) {

          conn.send(JSON.stringify({ type: 'hello', name: myName }));
        }
      });
      
      conn.on('data', (raw) => {
        try {
          const msg = JSON.parse(raw);

          if(msg.type === 'hello' && isHost && !authenticated) {

            conn.send(JSON.stringify({ type: 'welcome', secret: roomSecret, hostName: myName }));
            return;
          }
          
          if(msg.type === 'welcome' && !isHost && !authenticated) {
            roomSecret = msg.secret;
            authenticated = true;
            conn.send(JSON.stringify({ type: 'ready', name: myName }));
            addPeerConnection(peerId, msg.hostName || 'Host');
            return;
          }
          
          if(msg.type === 'ready' && isHost && !authenticated) {
            authenticated = true;
            addPeerConnection(peerId, msg.name);
            return;
          }
          
          if(!authenticated) {
            conn.close();
            return;
          }

          if(msg.type === 'chat') {
            addChatMessage(msg.name, msg.text);
            if(isHost) broadcastToPeers(msg, peerId);
            return;
          }
          
          if(msg.type === 'screen_stop') { 
            handleRemoteShareStop(msg.ownerId); 
            if(isHost) broadcastToPeers(msg, peerId); 
            return; 
          }
          
          if(msg.type === 'mic_stop') { 
            stopRemoteMic(msg.ownerId); 
            if(isHost) broadcastToPeers(msg, peerId); 
            return; 
          }
          
          if(msg.type === 'host_migration' && !isHost) {

            if(msg.newHostId === peer?.id) {

              isHost = true;
              roomSecret = msg.roomSecret;
              addSystemMessage(" You are now the host! The room is stable.");
              toast("You are now the host", 3000);

              for(let [pid, p] of peersMap.entries()) {
                if(pid !== peer?.id && p.dataConn) {
                  if(activeShareStream && activeShareOwner) callPeerWithScreen(pid, activeShareStream, activeShareOwner, activeShareName);
                  if(isMicEnabled && myMicStream) callPeerWithMic(pid, myMicStream, peer.id);
                  for(let [ownerId, stream] of remoteMicStreams.entries()) {
                    callPeerWithMic(pid, stream, ownerId);
                  }
                }
              }
            }
            return;
          }
        } catch(e) { console.warn(e); }
      });
      
      conn.on('close', () => {
        const p = peersMap.get(peerId);
        const nameLeft = p?.name || 'Someone';
        peersMap.delete(peerId);
        updatePeerCountUI();
        document.getElementById(`peer-card-${peerId}`)?.remove();
        stopRemoteMic(peerId);
        if(activeShareOwner === peerId) handleRemoteShareStop(peerId);
        addSystemMessage(`${nameLeft} left`);

        if(!isHost && peersMap.size > 0 && peerId === currentHostId && !migrationInProgress) {
          performHostMigration();
        }
      });
      
      if(!peersMap.has(peerId)) {
        peersMap.set(peerId, { dataConn: conn, name: 'Connecting...', micCalls: new Map() });
      } else {
        peersMap.get(peerId).dataConn = conn;
      }
    }

    function normalizeRoomId(raw) { let clean = raw.toUpperCase().replace(/[^A-Z0-9]/g,''); if(clean.length<6) clean = clean.padEnd(6,'X'); return clean.slice(0,3)+'-'+clean.slice(3,6); }
    function getHostPeerId(roomId) { return `HOST_${roomId.replace(/-/g,'')}`; }
    
    async function createRoom() {
      myName = hostNameInput.value.trim() || 'Host';
      const rawId = Math.random().toString(36).slice(2,8).toUpperCase();
      currentRoomId = normalizeRoomId(rawId);
      const hostPeerId = getHostPeerId(currentRoomId);
      currentHostId = hostPeerId;
      isHost = true;
      roomSecret = Math.random().toString(36).substring(2, 15);
      peer = new Peer(hostPeerId, ICE_CONFIG);
      await new Promise((res,rej) => { peer.on('open', res); peer.on('error', rej); });
      peer.on('connection', (conn) => setupDataConnection(conn, true));
      peer.on('call', onPeerCall);

      window.addEventListener('beforeunload', () => {
        if(isHost && peersMap.size > 0) {
          const sorted = Array.from(peersMap.keys()).sort();
          if(sorted.length > 0) {
            const newHostId = sorted[0];
            broadcastToPeers({ type: 'host_migration', newHostId: newHostId, newHostName: myName, roomSecret: roomSecret });
          }
        }
      });
      
      roomIdDisplay.classList.remove('hidden');
      roomIdDisplay.innerText = currentRoomId;
      showRoom();
      toast("Room created! Share code. Room survives host departure.");
    }
    
    async function joinRoom() {
      myName = joinNameInput.value.trim() || 'Guest';
      let rawCode = joinCodeInput.value.trim().toUpperCase();
      currentRoomId = normalizeRoomId(rawCode);
      const hostPeerId = getHostPeerId(currentRoomId);
      
      isHost = false;
      peer = new Peer(ICE_CONFIG);
      await new Promise((res,rej) => { peer.on('open', res); peer.on('error', rej); });
      const conn = peer.connect(hostPeerId, { reliable: true });
      setupDataConnection(conn, false);
      peer.on('call', onPeerCall);
      showRoom();
      toast("Joining room...");
    }
    
    function showRoom() {
      lobbyDiv.style.display = 'none';
      roomDiv.style.display = 'flex';
      headerRoomId.innerText = currentRoomId;
    }
    
    function leaveRoom() {
      if(myScreenStream) { myScreenStream.getTracks().forEach(t=>t.stop()); myScreenStream=null; }
      if(myMicStream) { myMicStream.getTracks().forEach(t=>t.stop()); myMicStream=null; }
      if(peer) peer.destroy();
      location.reload();
    }
    
    function toggleFullscreen() { const el = document.querySelector('.stage'); if(!document.fullscreenElement) el.requestFullscreen(); else document.exitFullscreen(); }

    createBtn.onclick = createRoom;
    joinBtn.onclick = joinRoom;
    leaveBtn.onclick = leaveRoom;
    shareBtn.onclick = () => { if(isSharingScreen) stopScreenShare(); else startScreenShare(); };
    muteBtn.onclick = toggleMic;
    fullscreenBtn.onclick = toggleFullscreen;
    sendChatBtn.onclick = () => { const txt = chatInput.value.trim(); if(txt) { addChatMessage(myName, txt); broadcastToPeers({ type:'chat', name: myName, text: txt }); chatInput.value = ''; } };
    chatInput.addEventListener('keypress', e => { if(e.key === 'Enter') sendChatBtn.click(); });
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.onclick = () => {
        currentTab = btn.dataset.tab;
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.getElementById(currentTab === 'peers' ? 'peers-panel' : 'chat-panel').classList.add('active');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if(currentTab === 'chat') { unreadCount = 0; chatBadge.style.display = 'none'; }
      };
    });
    window.onload = () => { const urlRoom = new URLSearchParams(location.search).get('room'); if(urlRoom) joinCodeInput.value = urlRoom; };
  })();
</script>
</body>
</html>
