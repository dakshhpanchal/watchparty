<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WatchParty</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0f1115;
  --surface:#171a21;
  --surface2:#1f2430;
  --border:#2c3442;
  --accent:#4f8cff;
  --text:#f5f7fb;
  --muted:#9aa4b2;
  --danger:#ff5d73;
  --success:#22c55e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,sans-serif;
  overflow:hidden;
}

button,input{
  font-family:inherit;
}

button{
  cursor:pointer;
}

.hidden{
  display:none !important;
}

/* ---------- LOBBY ---------- */

#lobby{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
}

.lobby-wrap{
  width:100%;
  max-width:1100px;
}

.hero{
  margin-bottom:36px;
}

.hero h1{
  font-size:48px;
  font-weight:700;
  margin-bottom:10px;
}

.hero p{
  color:var(--muted);
  font-size:15px;
}

.cards{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:18px;
  padding:24px;
}

.card h2{
  font-size:20px;
  margin-bottom:8px;
}

.card p{
  color:var(--muted);
  margin-bottom:20px;
  font-size:14px;
}

.input-group{
  display:flex;
  flex-direction:column;
  gap:12px;
}

input{
  width:100%;
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  padding:14px;
  border-radius:12px;
  outline:none;
  font-size:14px;
}

input:focus{
  border-color:var(--accent);
}

.btn{
  border:none;
  border-radius:12px;
  padding:14px;
  font-size:14px;
  font-weight:600;
  transition:.15s;
}

.btn:hover{
  opacity:.92;
}

.btn-primary{
  background:var(--accent);
  color:white;
}

.btn-secondary{
  background:var(--surface2);
  color:white;
  border:1px solid var(--border);
}

.room-code-box{
  background:var(--surface2);
  border:1px dashed var(--border);
  padding:14px;
  border-radius:12px;
  text-align:center;
  font-size:15px;
  font-weight:600;
  letter-spacing:.08em;
  margin-top:10px;
}

/* ---------- ROOM ---------- */

#room{
  height:100vh;
  display:none;
  flex-direction:column;
}

.topbar{
  height:64px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 18px;
  gap:16px;
  flex-shrink:0;
}

.logo{
  font-weight:700;
  font-size:18px;
}

.room-pill{
  background:var(--surface2);
  border:1px solid var(--border);
  padding:8px 12px;
  border-radius:999px;
  font-size:13px;
  color:var(--muted);
}

.peer-count{
  color:var(--muted);
  font-size:13px;
}

.spacer{
  flex:1;
}

.leave-btn{
  background:var(--danger);
  color:white;
  border:none;
  border-radius:10px;
  padding:10px 14px;
  font-size:13px;
}

.room-layout{
  flex:1;
  display:flex;
  min-height:0;
}

.stage{
  flex:1;
  position:relative;
  background:black;
  display:flex;
  align-items:center;
  justify-content:center;
}

#main-video{
  width:100%;
  height:100%;
  object-fit:contain;
}

.placeholder{
  text-align:center;
  color:var(--muted);
  padding:20px;
}

.stage-top{
  position:absolute;
  top:14px;
  left:14px;
  right:14px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  z-index:10;
}

.stage-label{
  background:rgba(0,0,0,.5);
  backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.08);
  padding:8px 12px;
  border-radius:12px;
  font-size:12px;
}

#fullscreen-btn{
  width:42px;
  height:42px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(0,0,0,.55);
  color:white;
  font-size:18px;
}

.sidebar{
  width:320px;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex;
  flex-direction:column;
}

.tabs{
  display:flex;
  border-bottom:1px solid var(--border);
}

.tab-btn{
  flex:1;
  background:none;
  border:none;
  color:var(--muted);
  padding:14px;
  font-weight:600;
  position:relative;
}

.tab-btn.active{
  color:white;
  background:rgba(255,255,255,.02);
}

#chat-badge{
  position:absolute;
  top:8px;
  right:20px;
  background:var(--danger);
  min-width:18px;
  height:18px;
  border-radius:999px;
  display:none;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:700;
  color:white;
}

.panel{
  flex:1;
  overflow:hidden;
  display:none;
}

.panel.active{
  display:flex;
  flex-direction:column;
}

#peers-panel{
  padding:14px;
  overflow-y:auto;
  gap:12px;
}

.peer-card{
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:14px;
  overflow:hidden;
}

.peer-video{
  height:140px;
  background:black;
}

.peer-video video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.peer-meta{
  padding:12px;
  font-size:13px;
}

.chat-messages{
  flex:1;
  overflow-y:auto;
  padding:14px;
  display:flex;
  flex-direction:column;
  gap:12px;
}

.chat-msg{
  display:flex;
  flex-direction:column;
  gap:4px;
}

.chat-msg-header{
  display:flex;
  gap:8px;
  align-items:center;
}

.chat-msg-author{
  font-size:13px;
  font-weight:600;
}

.chat-msg-time{
  color:var(--muted);
  font-size:11px;
}

.chat-msg-text{
  font-size:14px;
  line-height:1.4;
  word-break:break-word;
}

.chat-input{
  border-top:1px solid var(--border);
  padding:12px;
  display:flex;
  gap:10px;
}

.chat-input input{
  flex:1;
}

.controls{
  height:72px;
  border-top:1px solid var(--border);
  background:var(--surface);
  display:flex;
  align-items:center;
  padding:0 18px;
  gap:12px;
}

.ctrl-btn{
  border:none;
  border-radius:12px;
  padding:12px 16px;
  background:var(--surface2);
  color:white;
  font-size:13px;
  font-weight:600;
}

.ctrl-btn.primary{
  background:var(--accent);
}

.ctrl-btn.danger{
  background:var(--danger);
}

.ctrl-btn.active{
  background:var(--danger);
}

#toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:var(--surface);
  border:1px solid var(--border);
  padding:12px 18px;
  border-radius:14px;
  display:none;
  z-index:999;
}

@media(max-width:900px){

  .cards{
    grid-template-columns:1fr;
  }

  .room-layout{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:42vh;
    border-left:none;
    border-top:1px solid var(--border);
  }

  .stage{
    height:58vh;
  }
}
</style>
</head>

<body>

<!-- LOBBY -->

<div id="lobby">
  <div class="lobby-wrap">

    <div class="hero">
      <h1>WatchParty</h1>
      <p>Peer-to-peer screen sharing and watch parties.</p>
    </div>

    <div class="cards">

      <div class="card">
        <h2>Create Room</h2>
        <p>Host a room and invite friends.</p>

        <div class="input-group">
          <input id="host-name" type="text" placeholder="Your name" />
          <button class="btn btn-primary" id="create-btn" onclick="createRoom()">
            Create Room
          </button>

          <div id="room-id-display" class="room-code-box hidden"></div>
        </div>
      </div>

      <div class="card">
        <h2>Join Room</h2>
        <p>Enter a room code to connect.</p>

        <div class="input-group">
          <input id="join-name" type="text" placeholder="Your name" />
          <input id="join-code" type="text" placeholder="Room code" />

          <button class="btn btn-secondary" id="join-btn" onclick="joinRoom()">
            Join Room
          </button>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- ROOM -->

<div id="room">

  <div class="topbar">
    <div class="logo">WatchParty</div>

    <div class="room-pill" id="header-room-id"></div>

    <div class="peer-count">
      Participants:
      <span id="peer-count-num">1</span>
    </div>

    <div class="spacer"></div>

    <button class="leave-btn" onclick="leaveRoom()">
      Leave
    </button>
  </div>

  <div class="room-layout">

    <div class="stage">

      <video id="main-video" autoplay playsinline></video>

      <div class="placeholder" id="placeholder">
        Nobody is sharing their screen.
      </div>

      <div class="stage-top">
        <div class="stage-label" id="stage-label">
          No screen shared
        </div>

        <button id="fullscreen-btn" onclick="toggleFullscreen()">
          ⛶
        </button>
      </div>

    </div>

    <div class="sidebar">

      <div class="tabs">

        <button class="tab-btn active" onclick="switchTab('peers')">
          Peers
        </button>

        <button class="tab-btn" onclick="switchTab('chat')">
          Chat
          <span id="chat-badge">0</span>
        </button>

      </div>

      <div class="panel active" id="peers-panel"></div>

      <div class="panel" id="chat-panel">

        <div class="chat-messages" id="chat-messages"></div>

        <div class="chat-input">
          <input
            id="chat-input"
            type="text"
            placeholder="Message..."
            maxlength="200"
          />

          <button class="btn btn-secondary" onclick="sendChat()">
            Send
          </button>
        </div>

      </div>

    </div>

  </div>

  <div class="controls">

    <button
      class="ctrl-btn primary"
      id="share-btn"
      onclick="toggleScreenShare()"
    >
      Share Screen
    </button>

    <button
      class="ctrl-btn"
      id="mute-btn"
      onclick="toggleMute()"
    >
      Mic Off
    </button>

  </div>

</div>

<div id="toast"></div>

<script>
const state = {
  myName:'',
  roomId:'',
  peers:{},
  participants:new Set(),
  screenStream:null,
  micStream:null,
  remoteMicStreams:{},
  activeShareOwner:null,
  activeShareName:'',
  activeShareStream:null,
  isSharing:false,
  micEnabled:false,
  activeTab:'peers',
  unreadCount:0,
  loading:false
};

let peer = null;
let toastTimer;

/* ---------- UTIL ---------- */

function toast(msg,dur=2500){
  const el=document.getElementById('toast');
  el.textContent=msg;
  el.style.display='block';

  clearTimeout(toastTimer);

  toastTimer=setTimeout(()=>{
    el.style.display='none';
  },dur);
}

function genRoomId(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let id='';

  for(let i=0;i<6;i++){
    if(i===3) id+='-';
    id+=chars[Math.floor(Math.random()*chars.length)];
  }

  return id;
}

/* ---------- PEERJS ---------- */

function loadPeerJS(){
  return new Promise(resolve=>{
    if(window.Peer){
      resolve();
      return;
    }

    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.4/peerjs.min.js';
    s.onload=resolve;

    document.head.appendChild(s);
  });
}

async function initPeer(customId=null){

  await loadPeerJS();

  return new Promise((resolve,reject)=>{

    peer = customId
      ? new Peer(customId)
      : new Peer();

    peer.on('open',id=>{
      resolve(id);
    });

    peer.on('error',err=>{
      reject(err);
    });

    peer.on('disconnected',()=>{
      toast('Connection lost. Reconnecting...');

      try{
        peer.reconnect();
      }catch{
        setTimeout(()=>{
          location.reload();
        },2000);
      }
    });

    peer.on('close',()=>{
      toast('Connection closed');
    });

    peer.on('call',call=>{
      handleMediaCall(call);
    });

    peer.on('connection',conn=>{
      setupDataConn(conn);
    });

  });

}

/* ---------- ROOM ---------- */

function showRoom(){
  document.getElementById('lobby').style.display='none';
  document.getElementById('room').style.display='flex';

  document.getElementById('header-room-id').textContent=state.roomId;
}

function updatePeerCount(){
  document.getElementById('peer-count-num').textContent =
    state.participants.size + 1;
}

function isHost(){
  return peer?.id?.startsWith('ROOM-');
}

function broadcastData(msg,exceptPeerId=null){
  for(const [peerId,p] of Object.entries(state.peers)){
    if(peerId!==exceptPeerId && p.dataConn?.open){
      p.dataConn.send(JSON.stringify(msg));
    }
  }
}

/* ---------- CREATE ---------- */

async function createRoom(){

  if(state.loading) return;

  state.loading=true;

  const btn=document.getElementById('create-btn');

  btn.disabled=true;
  btn.textContent='Creating...';

  try{

    state.myName =
      document.getElementById('host-name').value.trim() || 'Host';

    const roomId=genRoomId();

    const peerId='ROOM-'+roomId.replace('-','');

    await initPeer(peerId);

    state.roomId=roomId;

    history.replaceState(null,'',`?room=${roomId}`);

    document.getElementById('room-id-display')
      .classList.remove('hidden');

    document.getElementById('room-id-display')
      .textContent=roomId;

    showRoom();

    toast('Room created');

  }catch(err){
    toast('Failed to create room');
  }

  btn.disabled=false;
  btn.textContent='Create Room';

  state.loading=false;
}

/* ---------- JOIN ---------- */

async function joinRoom(){

  if(state.loading) return;

  state.loading=true;

  const btn=document.getElementById('join-btn');

  btn.disabled=true;
  btn.textContent='Connecting...';

  try{

    state.myName =
      document.getElementById('join-name').value.trim() || 'Guest';

    state.roomId =
      document.getElementById('join-code')
        .value
        .trim()
        .toUpperCase();

    await initPeer();

    const hostId='ROOM-'+state.roomId.replace('-','');

    const conn=peer.connect(hostId,{
      reliable:true
    });

    setupDataConn(conn);

    conn.on('open',()=>{
      showRoom();
      toast('Connected');
    });

  }catch(err){
    toast('Connection failed');
  }

  btn.disabled=false;
  btn.textContent='Join Room';

  state.loading=false;
}

/* ---------- DATA ---------- */

function setupDataConn(conn){

  const peerId=conn.peer;

  conn.on('open',()=>{

    conn.send(JSON.stringify({
      type:'hello',
      name:state.myName
    }));

  });

  conn.on('data',raw=>{

    try{

      const msg=JSON.parse(raw);

      if(msg.type==='hello'){

        state.participants.add(peerId);

        updatePeerCount();

        addPeerCard(peerId,msg.name);

        callPeerWithActiveShare(peerId);
        callPeerWithActiveMic(peerId);

        if(isHost()){
          relayActiveMicsToPeer(peerId);
        }

      }

      if(msg.type==='chat'){

        addChatMsg(
          msg.name,
          msg.text
        );

      }

      if(msg.type==='screen-stop'){

        handleRemoteShareStop(msg.ownerId || peerId);

        if(isHost()){
          broadcastData(msg,peerId);
        }

      }

      if(msg.type==='mic-stop'){

        handleRemoteMicStop(msg.ownerId || peerId);

        if(isHost()){
          broadcastData(msg,peerId);
        }

      }

    }catch{}

  });

  conn.on('close',()=>{

    state.participants.delete(peerId);

    updatePeerCount();

    const card=document.getElementById(
      'peer-card-'+peerId
    );

    if(card) card.remove();

    handleRemoteMicStop(peerId);

    if(isHost()){
      broadcastData({
        type:'mic-stop',
        ownerId:peerId
      },peerId);
    }

  });

  state.peers[peerId]={dataConn:conn};
}

/* ---------- PEERS ---------- */

function addPeerCard(id,name){

  if(document.getElementById('peer-card-'+id)) return;

  const panel=document.getElementById('peers-panel');

  const card=document.createElement('div');

  card.className='peer-card';
  card.id='peer-card-'+id;

  card.innerHTML=`
    <div class="peer-video"></div>
    <div class="peer-meta">${name}</div>
  `;

  panel.appendChild(card);
}

/* ---------- CHAT ---------- */

function addChatMsg(author,text,isSystem=false){

  const box=document.getElementById('chat-messages');

  const div=document.createElement('div');

  div.className='chat-msg';

  const now=new Date();

  const t=
    now.getHours().toString().padStart(2,'0')+
    ':'+
    now.getMinutes().toString().padStart(2,'0');

  if(isSystem){

    const sys=document.createElement('div');

    sys.className='chat-msg-text';

    sys.textContent=text;

    div.appendChild(sys);

  }else{

    const header=document.createElement('div');

    header.className='chat-msg-header';

    const authorEl=document.createElement('span');

    authorEl.className='chat-msg-author';

    authorEl.textContent=author;

    const time=document.createElement('span');

    time.className='chat-msg-time';

    time.textContent=t;

    header.appendChild(authorEl);
    header.appendChild(time);

    const msg=document.createElement('div');

    msg.className='chat-msg-text';

    msg.textContent=text;

    div.appendChild(header);
    div.appendChild(msg);

  }

  box.appendChild(div);

  box.scrollTop=box.scrollHeight;

  handleUnreadChat();
}

function sendChat(){

  const input=document.getElementById('chat-input');

  const text=input.value.trim();

  if(!text) return;

  input.value='';

  addChatMsg(state.myName,text);

  for(const [,p] of Object.entries(state.peers)){

    if(p.dataConn?.open){

      p.dataConn.send(JSON.stringify({
        type:'chat',
        name:state.myName,
        text
      }));

    }

  }

}

/* ---------- TABS ---------- */

function switchTab(tab){

  state.activeTab=tab;

  document.querySelectorAll('.tab-btn')
    .forEach(b=>b.classList.remove('active'));

  if(tab==='peers'){
    document.querySelectorAll('.tab-btn')[0]
      .classList.add('active');
  }else{
    document.querySelectorAll('.tab-btn')[1]
      .classList.add('active');
  }

  document.getElementById('peers-panel')
    .classList.toggle('active',tab==='peers');

  document.getElementById('chat-panel')
    .classList.toggle('active',tab==='chat');

  if(tab==='chat'){
    state.unreadCount=0;
    updateChatBadge();
  }

}

function handleUnreadChat(){

  if(state.activeTab!=='chat'){

    state.unreadCount++;

    updateChatBadge();

  }

}

function updateChatBadge(){

  const badge=document.getElementById('chat-badge');

  if(state.unreadCount>0){

    badge.style.display='flex';

    badge.textContent=state.unreadCount;

  }else{

    badge.style.display='none';

  }

}

/* ---------- VIDEO ---------- */

function setMainVideo(stream,label){

  const v=document.getElementById('main-video');

  v.srcObject=stream;

  v.play().catch(()=>{
    if(stream?.getAudioTracks().length){
      toast('Click the shared video to enable audio');
    }
  });

  document.getElementById('placeholder')
    .style.display='none';

  document.getElementById('stage-label')
    .textContent=label;

}

function clearMainVideo(){

  const v=document.getElementById('main-video');

  v.srcObject=null;

  document.getElementById('placeholder')
    .style.display='block';

  document.getElementById('stage-label')
    .textContent='No screen shared';

}

function setActiveShare(ownerId,ownerName,stream){

  state.activeShareOwner=ownerId;
  state.activeShareName=ownerName || 'Someone';
  state.activeShareStream=stream;

  document.getElementById('main-video').muted = ownerId===peer?.id;

  setMainVideo(
    stream,
    `${state.activeShareName}'s screen`
  );

}

function clearActiveShare(ownerId=null){

  if(ownerId && state.activeShareOwner!==ownerId) return;

  state.activeShareOwner=null;
  state.activeShareName='';
  state.activeShareStream=null;

  clearMainVideo();

}

function closeCall(call){

  try{
    call?.close();
  }catch{}

}

function screenMetadata(ownerId=peer.id,ownerName=state.myName){

  return {
    type:'screen',
    ownerId,
    ownerName
  };

}

function micMetadata(ownerId=peer.id,ownerName=state.myName){

  return {
    type:'mic',
    ownerId,
    ownerName
  };

}

function callPeerWithStream(peerId,stream,metadata){

  if(!stream || peerId===peer.id) return null;

  const p=state.peers[peerId];

  if(!p) return null;

  closeCall(p.call);

  const call=peer.call(peerId,stream,{metadata});

  p.call=call;

  call.on('close',()=>{
    if(p.call===call) p.call=null;
  });

  call.on('error',()=>{
    if(p.call===call) p.call=null;
  });

  return call;

}

function getPeerState(peerId){

  const p=state.peers[peerId];

  if(!p) return null;

  if(!p.micCalls) p.micCalls={};

  return p;

}

function callPeerWithMic(peerId,stream,metadata=micMetadata()){

  if(!stream || peerId===peer.id) return null;

  const p=getPeerState(peerId);

  if(!p) return null;

  const ownerId=metadata.ownerId || peer.id;

  closeCall(p.micCalls[ownerId]);

  const call=peer.call(peerId,stream,{metadata});

  p.micCalls[ownerId]=call;

  call.on('close',()=>{
    if(p.micCalls[ownerId]===call){
      delete p.micCalls[ownerId];
    }
  });

  call.on('error',()=>{
    if(p.micCalls[ownerId]===call){
      delete p.micCalls[ownerId];
    }
  });

  return call;

}

function callPeerWithActiveShare(peerId){

  if(state.screenStream){
    callPeerWithStream(
      peerId,
      state.screenStream,
      screenMetadata()
    );
    return;
  }

  if(isHost() && state.activeShareStream){
    callPeerWithStream(
      peerId,
      state.activeShareStream,
      screenMetadata(
        state.activeShareOwner,
        state.activeShareName
      )
    );
  }

}

function callPeerWithActiveMic(peerId){

  if(state.micEnabled && state.micStream){
    callPeerWithMic(
      peerId,
      state.micStream,
      micMetadata()
    );
  }

}

function relayShareToPeers(stream,metadata,exceptPeerId){

  if(!isHost()) return;

  for(const peerId of Object.keys(state.peers)){
    if(peerId!==exceptPeerId){
      callPeerWithStream(peerId,stream,metadata);
    }
  }

}

function relayMicToPeers(stream,metadata,exceptPeerId){

  if(!isHost()) return;

  for(const peerId of Object.keys(state.peers)){
    if(peerId!==exceptPeerId){
      callPeerWithMic(peerId,stream,metadata);
    }
  }

}

function relayActiveMicsToPeer(peerId){

  if(!isHost()) return;

  for(const [ownerId,stream] of Object.entries(state.remoteMicStreams)){
    callPeerWithMic(
      peerId,
      stream,
      micMetadata(ownerId)
    );
  }

}

function handleMediaCall(call){

  const metadata=call.metadata || {};

  if(metadata.type==='mic'){
    handleMicCall(call);
    return;
  }

  const ownerId=metadata.ownerId || call.peer;
  const ownerName=metadata.ownerName || call.peer;

  call.answer();

  call.on('stream',stream=>{

    setActiveShare(ownerId,ownerName,stream);

    stream.getVideoTracks().forEach(track=>{
      track.addEventListener('ended',()=>{
        handleRemoteShareStop(ownerId);
      });
    });

    relayShareToPeers(
      stream,
      screenMetadata(ownerId,ownerName),
      call.peer
    );

  });

  call.on('close',()=>{
    handleRemoteShareStop(ownerId);
  });

  call.on('error',()=>{
    handleRemoteShareStop(ownerId);
  });

}

function micElementId(ownerId){

  return 'remote-mic-'+ownerId.replace(/[^a-z0-9_-]/gi,'-');

}

function setRemoteMic(ownerId,stream){

  if(ownerId===peer?.id) return;

  state.remoteMicStreams[ownerId]=stream;

  let audio=document.getElementById(micElementId(ownerId));

  if(!audio){
    audio=document.createElement('audio');
    audio.id=micElementId(ownerId);
    audio.autoplay=true;
    audio.playsInline=true;
    document.body.appendChild(audio);
  }

  audio.srcObject=stream;

  audio.play().catch(()=>{
    toast('Click anywhere to enable mic audio');
  });

}

function removeRemoteMic(ownerId){

  delete state.remoteMicStreams[ownerId];

  const audio=document.getElementById(micElementId(ownerId));

  if(audio){
    audio.srcObject=null;
    audio.remove();
  }

}

function closeMicCallsForOwner(ownerId){

  for(const p of Object.values(state.peers)){
    if(p.micCalls?.[ownerId]){
      closeCall(p.micCalls[ownerId]);
      delete p.micCalls[ownerId];
    }
  }

}

function stopMicSharing(){

  if(!state.micEnabled) return;

  state.micEnabled=false;

  if(state.micStream){
    state.micStream
      .getAudioTracks()
      .forEach(track=>{
        track.enabled=false;
      });
  }

  broadcastData({
    type:'mic-stop',
    ownerId:peer.id
  });

  closeMicCallsForOwner(peer.id);

  const btn=document.getElementById('mute-btn');

  if(btn){
    btn.textContent='Mic Off';
    btn.classList.add('active');
  }

}

function handleMicCall(call){

  const metadata=call.metadata || {};
  const ownerId=metadata.ownerId || call.peer;

  call.answer();

  call.on('stream',stream=>{
    setRemoteMic(ownerId,stream);
    relayMicToPeers(stream,micMetadata(ownerId),call.peer);
  });

  call.on('close',()=>{
    handleRemoteMicStop(ownerId);
  });

  call.on('error',()=>{
    handleRemoteMicStop(ownerId);
  });

}

function handleRemoteShareStop(ownerId){

  if(state.activeShareOwner!==ownerId) return;

  clearActiveShare(ownerId);

  if(isHost()){
    for(const [peerId,p] of Object.entries(state.peers)){
      if(peerId!==ownerId){
        closeCall(p.call);
        p.call=null;
      }
    }
  }

}

function handleRemoteMicStop(ownerId){

  removeRemoteMic(ownerId);
  closeMicCallsForOwner(ownerId);

}

/* ---------- SCREEN SHARE ---------- */

async function toggleScreenShare(){

  if(state.isSharing){
    stopSharing();
  }else{
    startSharing();
  }

}

async function startSharing(){

  try{

    const stream =
      await navigator.mediaDevices.getDisplayMedia({
        video:true,
        audio:true
      });

    state.screenStream=stream;
    state.isSharing=true;

    setActiveShare(peer.id,state.myName,stream);

    stream.getVideoTracks().forEach(track=>{
      track.addEventListener('ended',stopSharing,{once:true});
    });

    for(const [peerId,p] of Object.entries(state.peers)){

      callPeerWithStream(
        peerId,
        stream,
        screenMetadata()
      );

    }

    document.getElementById('share-btn')
      .classList.add('danger');

    document.getElementById('share-btn')
      .textContent='Stop Sharing';

  }catch(err){

    toast('Screen share cancelled');

  }

}

function stopSharing(){

  if(!state.screenStream || !state.isSharing) return;

  state.isSharing=false;

  broadcastData({
    type:'screen-stop',
    ownerId:peer.id
  });

  for(const [,p] of Object.entries(state.peers)){
    closeCall(p.call);
    p.call=null;
  }

  state.screenStream.getTracks()
    .forEach(t=>t.stop());

  state.screenStream=null;

  clearActiveShare(peer.id);

  document.getElementById('share-btn')
    .classList.remove('danger');

  document.getElementById('share-btn')
    .textContent='Share Screen';

}

/* ---------- MIC ---------- */

async function toggleMute(){

  const btn=document.getElementById('mute-btn');

  try{

    if(!state.micStream){

      state.micStream =
        await navigator.mediaDevices.getUserMedia({
          audio:{
            echoCancellation:true,
            noiseSuppression:true,
            autoGainControl:true
          }
        });

    }

    const turningOn=!state.micEnabled;

    state.micStream
      .getAudioTracks()
      .forEach(track=>{
        track.enabled=turningOn;
      });

    if(turningOn){

      state.micEnabled=true;

      for(const peerId of Object.keys(state.peers)){
        callPeerWithMic(peerId,state.micStream,micMetadata());
      }

    }else{

      stopMicSharing();

    }

    if(state.micEnabled){

      btn.textContent='Mic On';

      btn.classList.remove('active');

    }else{

      btn.textContent='Mic Off';

      btn.classList.add('active');

    }

  }catch{

    toast('Microphone access denied');

  }

}

/* ---------- FULLSCREEN ---------- */

function toggleFullscreen(){

  const el=document.querySelector('.stage');

  if(!document.fullscreenElement){
    el.requestFullscreen();
  }else{
    document.exitFullscreen();
  }

}

/* ---------- LEAVE ---------- */

function leaveRoom(){

  stopSharing();
  stopMicSharing();

  if(state.micStream){

    state.micStream.getTracks()
      .forEach(t=>t.stop());

  }

  if(peer){
    peer.destroy();
  }

  location.reload();
}

/* ---------- CLEANUP ---------- */

window.addEventListener('beforeunload',()=>{

  try{

    stopSharing();
    stopMicSharing();

    if(state.micStream){

      state.micStream.getTracks()
        .forEach(t=>t.stop());

    }

    if(peer){
      peer.destroy();
    }

  }catch{}

});

/* ---------- URL ROOM ---------- */

window.addEventListener('DOMContentLoaded',()=>{

  const params=new URLSearchParams(location.search);

  const room=params.get('room');

  if(room){

    document.getElementById('join-code').value=room;

  }

  document.getElementById('chat-input')
    .addEventListener('keydown',e=>{

      if(e.key==='Enter'){
        sendChat();
      }

    });

});
</script>
